<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>修改時段</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4" style="max-width: 500px;">
    <h2>修改營業時段</h2>
    <form th:action="@{/backend/businesshours/save}" th:object="${businessHoursVO}" method="post">
        <input type="hidden" th:field="*{sessionId}">
        <div class="mb-3">
            <label class="form-label">時段編號 ID: </label>
            <span class="fw-bold" th:text="*{sessionId}">1</span>
        </div>
        <div class="mb-3">
            <label class="form-label">開始時間:</label>
            <input type="text" th:field="*{startTime}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">結束時間:</label>
            <input type="text" th:field="*{endTime}" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-warning">確認更新</button>
        <a href="/backend/businesshours/list" class="btn btn-secondary">取消</a>
    </form>
</body>
</html>
