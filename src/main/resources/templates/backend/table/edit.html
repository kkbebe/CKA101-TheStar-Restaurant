<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>修改桌型</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4" style="max-width: 500px;">
    <h2>修改桌型數量設定</h2>
    
    <form th:action="@{/backend/table/save}" th:object="${restaurantTableVO}" method="post" class="mt-3">
        
        <input type="hidden" th:field="*{tableTypeId}">

        <div class="mb-3">
            <label class="form-label">桌型名稱規格:</label>
            <input type="text" th:field="*{tableTypeName}" class="form-control-plaintext fs-4 fw-bold text-primary" readonly th:value="*{tableTypeName}">
        </div>

        <div class="mb-3">
            <label class="form-label">更新總桌數:</label>
            <input type="number" th:field="*{tableTypeCount}" class="form-control" required min="0">
            <div class="text-danger" th:if="${#fields.hasErrors('tableTypeCount')}" th:errors="*{tableTypeCount}"></div>
        </div>

        <button type="submit" class="btn btn-warning">更新設定</button>
        <a href="/backend/table/list" class="btn btn-secondary">返回列表</a>
    </form>
</body>
</html>
