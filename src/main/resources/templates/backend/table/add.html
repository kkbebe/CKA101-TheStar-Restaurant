<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>新增桌型</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4" style="max-width: 500px;">
    <h2>定義新桌型規格</h2>
    
    <form th:action="@{/backend/table/save}" th:object="${restaurantTableVO}" method="post" class="mt-3">
        
        <div class="mb-3">
            <label class="form-label">桌型名稱規格 (例如 LARGE_TABLE 或 4_PERSON_TABLE):</label>
            <input type="text" th:field="*{tableTypeName}" class="form-control" placeholder="請輸入桌型名稱" required>
            <div class="text-danger" th:if="${#fields.hasErrors('tableTypeName')}" th:errors="*{tableTypeName}"></div>
        </div>
        
        <div class="mb-3">
            <label class="form-label">餐廳內此規格總桌數:</label>
            <input type="number" th:field="*{tableTypeCount}" class="form-control" placeholder="請輸入總桌數" required min="1">
            <div class="text-danger" th:if="${#fields.hasErrors('tableTypeCount')}" th:errors="*{tableTypeCount}"></div>
        </div>
        
        <button type="submit" class="btn btn-success">確認儲存</button>
        <a href="/backend/table/list" class="btn btn-secondary">取消</a>
    </form>
</body>
</html>
