<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Star 餐廳 - 關於我們</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #fafafa; color: #333; }
        .navbar { background-color: #1a1a1a; }
        .navbar-brand, .nav-link { color: #fff !important; }
        .nav-link:hover { color: #ffc107 !important; }
        .hero-section { background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=1200') no-repeat center center/cover; height: 400px; display: flex; align-items: center; justify-content: center; color: white; }
        .footer { background-color: #1a1a1a; color: #aaa; padding: 20px 0; margin-top: 40px; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
        <a class="navbar-brand" th:href="@{/user/index}">⭐ The Star</a>
        <div class="collapse navbar-collapse justify-content-end">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" th:href="@{/user/index}">首頁介紹</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/user/menu}">美味菜單</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/user/booking}">線上訂位</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/user/reviews}">顧客評論</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="hero-section text-center">
    <div>
        <h1 class="display-4 fw-bold">歡迎光臨 The Star 餐廳</h1>
        <p class="lead">璀璨星光下的極致奢華饗宴</p>
    </div>
</div>

<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-8 text-center">
            <h2 class="mb-4">關於 The Star</h2>
            <p class="lead text-muted">我們成立於西元 2024 年，致力於將新鮮的頂級食材與極致的烹飪工藝相結合。無論是浪漫的雙人約會、溫馨的家庭聚餐，還是商務宴會，The Star 都將為您營造最璀璨迷人的用餐時光。</p>
            <hr class="my-5">
            <h3>營業時間</h3>
            <p>週一至週日：11:30 - 14:30 | 17:30 - 21:30</p>
            <a th:href="@{/user/booking}" class="btn btn-warning btn-lg mt-3">立即預約訂位</a>
        </div>
    </div>
</div>

<footer class="footer text-center">
    <p>© 2026 The Star user. All Rights Reserved. 後台系統對接準備就緒。</p>
</footer>

</body>
</html>
