<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>發表新評論</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container my-5" style="max-width: 600px;">
    <div class="card shadow">
        <div class="card-header bg-dark text-white">
            <h4 class="mb-0">✍️ 發表餐廳評論</h4>
        </div>
        <div class="card-body">
            <p class="text-muted">親愛的會員 <strong th:text="${member.memberName}">顧客</strong> 您好：</p>

            <div th:if="${#lists.isEmpty(reservations)}" class="alert alert-warning">
                您目前沒有尚未評論的訂位紀錄！每一筆訂位只能評論一次。
                <a th:href="@{/user/reviews}" class="alert-link d-block mt-2">返回評論列表</a>
            </div>

            <form th:if="${!#lists.isEmpty(reservations)}" th:action="@{/user/submitReview}" method="post">
                
                <div class="mb-3">
                    <label class="form-label fw-bold">請選擇要評論的訂位：</label>
                    <select name="reservationId" class="form-select" required>
                        <option value="" disabled selected>-- 請選擇訂位日期與編號 --</option>
                        <option th:each="res : ${reservations}" 
                                th:value="${res.reservationId}" 
                                th:text="'訂位日期: ' + ${res.date} + ' (編號: #' + ${res.reservationId} + ')'">
                        </option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">給予星等 (1~5 星)：</label>
                    <select name="reviewStars" class="form-select" required>
                        <option value="5">5 ★ (非常好)</option>
                        <option value="4">4 ★ (滿意)</option>
                        <option value="3">3 ★ (普通)</option>
                        <option value="2">2 ★ (待改善)</option>
                        <option value="1">1 ★ (不滿意)</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">評論內容：</label>
                    <textarea name="reviewContent" class="form-control" rows="4" maxlength="1000" placeholder="分享您的美味體驗..." required></textarea>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-dark">送出評論</button>
                    <a th:href="@{/user/reviews}" class="btn btn-outline-secondary">取消</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
