<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Star 餐廳 - 線上訂位</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f7f9fa; color: #333; }
        .navbar { background-color: #1a1a1a; }
        .navbar-brand, .nav-link { color: #fff !important; }
        .booking-card { background: white; border-radius: 12px; padding: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .footer { background-color: #1a1a1a; color: #aaa; padding: 20px 0; margin-top: 40px; }
        .error-text { color: #d9534f; font-size: 0.85rem; margin-top: 5px; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
        <a class="navbar-brand" th:href="@{/user/index}">⭐ The Star</a>
        <div class="collapse navbar-collapse justify-content-end">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" th:href="@{/user/index}">首頁介紹</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/user/menu}">美味菜單</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/user/booking}">線上訂位</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/user/reviews}">顧客評論</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="text-center mb-4">
                <h1 class="fw-bold">立即預約席位</h1>
                <p class="text-muted">請填寫下方表單以完成您的線上訂位需求</p>
            </div>
            
            <div th:if="${successMessage}" class="alert alert-success text-center" th:text="${successMessage}"></div>
            <div th:if="${errorMessage}" class="alert alert-danger text-center" th:text="${errorMessage}"></div>

            <div class="booking-card">
                <form th:action="@{/user/booking/submit}" th:object="${reservationVO}" method="POST">
                    
                    <div class="mb-3">
                        <label class="form-label">會員編號 (Member ID)</label>
                        <input type="number" class="form-control" th:field="*{memberVO.memberId}" readonly>
                        <div class="form-text">已鎖定當前登入之會員。</div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">預約用餐日期</label>
                        <input type="date" class="form-control" th:field="*{date}" required>
                        <div class="error-text" th:if="${#fields.hasErrors('date')}" th:errors="*{date}"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">預約用餐時段</label>
                        <select class="form-select" th:field="*{businessHoursVO.sessionId}" required>
                            <option value="">-- 請選擇時段 --</option>
                            <option value="1">午餐首段 (11:30 - 13:00)</option>
                            <option value="2">午餐次段 (13:00 - 14:30)</option>
                            <option value="3">晚餐首段 (17:30 - 19:30)</option>
                            <option value="4">晚餐次段 (19:30 - 21:30)</option>
                        </select>
                        <div class="error-text" th:if="${#fields.hasErrors('businessHoursVO.sessionId')}" th:errors="*{businessHoursVO.sessionId}"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">預約桌型大小</label>
                        <select class="form-select" th:field="*{RestaurantTableVO.tableTypeId}" required>
                            <option value="">-- 請選擇桌型 --</option>
                            <option value="1">精緻雙人桌 (適合 1-2 人)</option>
                            <option value="2">溫馨四人桌 (適合 3-4 人)</option>
                            <option value="3">豪華大圓桌 (適合 5-10 人)</option>
                        </select>
                        <div class="error-text" th:if="${#fields.hasErrors('RestaurantTableVO.tableTypeId')}" th:errors="*{RestaurantTableVO.tableTypeId}"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">特殊需求備註 (選填)</label>
                        <textarea class="form-control" th:field="*{reservationRequest}" rows="3" placeholder="如有慶生、求婚需求或對食物過敏..."></textarea>
                        <div class="error-text" th:if="${#fields.hasErrors('reservationRequest')}" th:errors="*{reservationRequest}"></div>
                    </div>

                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary btn-lg">確認送出訂位</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<footer class="footer text-center">
    <p>© 2026 The Star user. All Rights Reserved.</p>
</footer>

</body>
</html>
