<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Star 餐廳 - 美味菜單</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #fdfbf7; color: #333; }
        .navbar { background-color: #1a1a1a; }
        .navbar-brand, .nav-link { color: #fff !important; }
        .card { border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); }
        .menu-price { color: #d9534f; font-weight: bold; font-size: 1.2rem; }
        .footer { background-color: #1a1a1a; color: #aaa; padding: 20px 0; margin-top: 40px; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
        <a class="navbar-brand" th:href="@{/restaurant/index}">⭐ The Star</a>
        <div class="collapse navbar-collapse justify-content-end">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" th:href="@{/restaurant/index}">首頁介紹</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/restaurant/menu}">美味菜單</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/restaurant/booking}">線上訂位</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/restaurant/reviews}">顧客評論</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container my-5">
    <h1 class="text-center mb-5 fw-bold">⭐ 璀璨精選菜單 ⭐</h1>
    
    <h3 class="border-start border-warning border-4 ps-2 mb-4">所有精選餐點</h3>
    
    <div th:if="${#lists.isEmpty(menuList)}" class="text-center text-muted my-5">
        <h4>菜單正在準備中，敬請期待！</h4>
    </div>

    <div class="row g-4 mb-5">
        <div class="col-md-4" th:each="menu : ${menuList}">
            <div class="card h-100">
                <img th:src="${menu.imageUrl != null && menu.imageUrl != ''} ? ${menu.imageUrl} : 'https://images.unsplash.com/photo-1544025162-d76694265947?w=500'" 
                     class="card-img-top" alt="餐點圖片">
                <div class="card-body">
                    <h5 class="card-title fw-bold" th:text="${menu.itemName}">餐點名稱</h5>
                    
                    <p class="card-text text-muted" th:text="${menu.itemDesc}">餐點描述文字...</p>
                    
                    <div class="menu-price" th:text="'$ ' + ${menu.price}">$ 0</div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="footer text-center">
    <p>© 2026 The Star Restaurant. All Rights Reserved.</p>
</footer>

</body>
</html>
