<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>修改餐點項目</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4" style="max-width: 600px;">
    <h2>編修餐點資訊</h2>
    <form th:action="@{/admin/menu/save}" th:object="${restaurantMenuVO}" method="post">
        <input type="hidden" th:field="*{itemId}">
        <div class="mb-3">
            <label class="form-label">修改菜單分類:</label>
            <select th:field="*{menuCategoryVO.categoryId}" class="form-select" required>
                <option th:each="cat : ${categoryList}" th:value="${cat.categoryId}" th:text="${cat.categoryName}"></option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">餐點名稱:</label>
            <input type="text" th:field="*{itemName}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">餐點描述:</label>
            <textarea th:field="*{itemDesc}" class="form-control" rows="3"></textarea>
        </div>
        <div class="mb-3">
            <label class="form-label">單價:</label>
            <input type="number" step="0.01" th:field="*{price}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">圖片網址:</label>
            <input type="text" th:field="*{imageUrl}" class="form-control">
        </div>
        <div class="mb-3">
            <label class="form-label">排序:</label>
            <input type="number" th:field="*{sortOrder}" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-warning">更變儲存</button>
        <a href="/admin/menu/list" class="btn btn-secondary">返回列表</a>
    </form>
</body>
</html>
