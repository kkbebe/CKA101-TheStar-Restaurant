<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>新增時段</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4" style="max-width: 500px;">
    <h2>新增營業時段設定</h2>
    <p class="text-muted">請輸入格式如 HH:mm:ss 的時間 (例如 11:30:00)</p>
    <form th:action="@{/admin/businesshours/save}" th:object="${businessHoursVO}" method="post">
        <div class="mb-3">
            <label class="form-label">開始時間:</label>
            <input type="text" th:field="*{startTime}" class="form-control" placeholder="12:00:00" required>
        </div>
        <div class="mb-3">
            <label class="form-label">結束時間:</label>
            <input type="text" th:field="*{endTime}" class="form-control" placeholder="14:30:00" required>
        </div>
        <button type="submit" class="btn btn-success">新增儲存</button>
        <a href="/admin/businesshours/list" class="btn btn-secondary">返回</a>
    </form>
</body>
</html>
