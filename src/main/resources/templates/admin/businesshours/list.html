<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/common_sidebar :: common-head('營業時段管理')}"></head>
<body>
    <div th:replace="~{admin/common_sidebar :: sidebar('hours')}"></div>
    <div class="main-content">
        <div th:replace="~{admin/common_sidebar :: topbar('餐廳營業時段配置')}"></div>
        <div class="page-body">
            <div class="card p-4">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="m-0 fw-bold"><i class="fa-solid fa-clock me-2"></i>營業時段列表</h5>
                    <a href="/admin/businesshours/addPage" class="btn btn-primary"><i class="fa-solid fa-plus me-1"></i>新增時段</a>
                </div>
                <table class="table table-striped table-bordered align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>時段流水號 (Session ID)</th>
                            <th>開始時間 (Start)</th>
                            <th>結束時間 (End)</th>
                            <th width="180">操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="bh : ${bhList}">
                            <td th:text="${bh.sessionId}">1</td>
                            <td class="text-success fw-bold" th:text="${bh.startTime}">11:30:00</td>
                            <td class="text-danger fw-bold" th:text="${bh.endTime}">14:00:00</td>
                            <td>
                                <a th:href="@{/admin/businesshours/editPage(sessionId=${bh.sessionId})}" class="btn btn-warning btn-sm"><i class="fa-solid fa-pen"></i> 修改</a>
                                <form th:action="@{/admin/businesshours/delete}" method="post" style="display:inline;" onsubmit="return confirm('確定要刪除此營業時段嗎？');">
                                    <input type="hidden" name="sessionId" th:value="${bh.sessionId}">
                                    <button type="submit" class="btn btn-danger btn-sm"><i class="fa-solid fa-trash"></i> 刪除</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
